<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Tributos - Alcaldía de Ayacucho</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-image" id="fachada-dinamica">
            <div class="overlay">
                <h1>Alcaldía del Municipio Ayacucho</h1>
                <p>Gestión transparente y eficiente para nuestro pueblo.</p>
            </div>
        </div>

        <div class="login-form-section">
            <div class="form-box">
                <img src="https://res.cloudinary.com/tu-usuario/image/upload/v1/logos/escudo-ayacucho.png" alt="Escudo Ayacucho" class="logo">
                <h2>Iniciar Sesión</h2>
                <p>Ingrese sus credenciales para acceder al sistema de impuestos.</p>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label for="cedula">Cédula o RIF</label>
                        <input type="text" id="cedula" placeholder="V-12345678" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">Entrar al Sistema</button>
                </form>
                
                <div class="form-footer">
                    <a href="#">¿Olvidó su contraseña?</a>
                    <span>|</span>
                    <a href="registro.html">Registrarse como Contribuyente</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
